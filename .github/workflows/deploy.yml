name: deploy to oracle vm
on:
  push:
    branches:
      - codex/file-backed-review-ui
  workflow_dispatch: {}

concurrency:
  # Serialise: a second push while a deploy is mid-build would race the
  # `git reset --hard` against the running build.
  group: deploy-oracle-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: load deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: trust host key
        # We accept-on-first-use rather than pinning to an IP that can change
        # on Oracle re-provision. The deploy key is hard-restricted via
        # `command="..."` in authorized_keys, so a wrong host can't be coerced
        # into doing anything other than running deploy.sh.
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: run deploy
        # The forced `command="..."` in authorized_keys ignores any arguments
        # we pass here — the script always runs. We still pass `deploy` so
        # the audit log shows intent.
        run: ssh "ubuntu@${{ secrets.DEPLOY_HOST }}" deploy
