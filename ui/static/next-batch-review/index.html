<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Batch-2 · auto-selected FT edits</title>
<style>
  :root { --acc:#2563eb; --good:#16a34a; --bad:#dc2626; --mut:#6b7280; --bg:#f8fafc; }
  * { box-sizing:border-box; }
  body { font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; margin:0; color:#111827;
         background:var(--bg); }
  header { position:sticky; top:0; background:#0f172a; color:#fff; padding:10px 16px;
           display:flex; gap:14px; align-items:center; flex-wrap:wrap; z-index:5; }
  header b { font-size:1.05em; }
  header .sp { flex:1; }
  select, button { font-size:14px; padding:6px 10px; border-radius:8px; border:1px solid #cbd5e1;
                   background:#fff; cursor:pointer; }
  header select, header button { background:#1e293b; color:#fff; border-color:#334155; }
  .wrap { max-width:900px; margin:20px auto; padding:0 16px; }
  .card { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:20px 22px;
          box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .meta { display:flex; gap:10px; flex-wrap:wrap; align-items:center; color:var(--mut);
          font-size:.85em; margin-bottom:14px; }
  .tag { display:inline-block; font-size:.85em; padding:.15em .7em; border-radius:999px;
         background:#eff6ff; color:var(--acc); font-weight:600; }
  .tag.ac { background:#ecfdf5; color:var(--good); }
  .diff { font-size:1.25em; line-height:1.6; margin:8px 0 4px; }
  .diff .del { background:#fee2e2; color:var(--bad); text-decoration:line-through; padding:0 2px; border-radius:3px; }
  .diff .ins { background:#dcfce7; color:var(--good); padding:0 2px; border-radius:3px; }
  .lbl { font-size:.7em; color:var(--mut); text-transform:uppercase; letter-spacing:.04em; margin-top:14px; }
  .txt { font-size:1.05em; }
  .why { margin-top:12px; color:var(--mut); font-style:italic; }
  .controls { display:flex; gap:10px; align-items:center; margin-top:20px; flex-wrap:wrap; }
  .play { background:var(--acc); color:#fff; border:none; font-size:15px; padding:9px 18px; }
  .mark { border-color:#f59e0b; }
  .mark.on { background:#fef3c7; border-color:#f59e0b; color:#92400e; font-weight:600; }
  .bar { height:6px; background:#e5e7eb; border-radius:99px; overflow:hidden; margin-top:8px; }
  .bar > div { height:100%; background:var(--acc); width:0; }
  .hint { color:var(--mut); font-size:.8em; margin-top:14px; }
  a { color:var(--acc); }
</style>
</head>
<body>
<header>
  <b>Batch-2 · auto-selected edits</b>
  <span id="count"></span>
  <span class="sp"></span>
  <label style="color:#cbd5e1;font-size:.85em">κατηγορία
    <select id="cat"></select></label>
  <label style="color:#cbd5e1;font-size:.85em"><input type="checkbox" id="onlymark"> μόνο marked</label>
  <button id="export">Export marked</button>
</header>

<div class="wrap">
  <div class="card" id="card">φόρτωση…</div>
  <p class="hint">Πλοήγηση: <b>←</b>/<b>→</b> · <b>Space</b> = play/stop · <b>m</b> = mark.
     Τα marks αποθηκεύονται τοπικά (localStorage) — καμία εγγραφή στη βάση. Ο ήχος παίζει μέσω του
     <code>/api/audio</code> proxy, οπότε άνοιξε τη σελίδα από το τρέχον UI (π.χ. <code>/next-batch-review/</code>).</p>
</div>

<audio id="au" preload="none"></audio>

<script>
const MARK_KEY = 'nb2_marks';
let all=[], view=[], i=0, playing=false, stopAt=0;
const au = document.getElementById('au');
const marks = new Set(JSON.parse(localStorage.getItem(MARK_KEY) || '[]'));

function saveMarks(){ localStorage.setItem(MARK_KEY, JSON.stringify([...marks])); }

// lightweight word-level diff (LCS) -> red deletions / green insertions
function diff(a, b){
  const A=a.split(/(\s+)/), B=b.split(/(\s+)/);
  const n=A.length, m=B.length;
  const dp=Array.from({length:n+1},()=>new Int32Array(m+1));
  for(let x=n-1;x>=0;x--) for(let y=m-1;y>=0;y--)
    dp[x][y] = A[x]===B[y] ? dp[x+1][y+1]+1 : Math.max(dp[x+1][y], dp[x][y+1]);
  let x=0,y=0,out='';
  const esc=s=>s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  while(x<n && y<m){
    if(A[x]===B[y]){ out+=esc(A[x]); x++; y++; }
    else if(dp[x+1][y]>=dp[x][y+1]){ if(A[x].trim())out+=`<span class="del">${esc(A[x])}</span>`; else out+=esc(A[x]); x++; }
    else { if(B[y].trim())out+=`<span class="ins">${esc(B[y])}</span>`; else out+=esc(B[y]); y++; }
  }
  while(x<n){ if(A[x].trim())out+=`<span class="del">${esc(A[x])}</span>`; else out+=esc(A[x]); x++; }
  while(y<m){ if(B[y].trim())out+=`<span class="ins">${esc(B[y])}</span>`; else out+=esc(B[y]); y++; }
  return out;
}

function applyFilter(){
  const cat = document.getElementById('cat').value;
  const onlyMark = document.getElementById('onlymark').checked;
  view = all.filter(e => (cat==='(όλες)'||e.cat===cat) && (!onlyMark || marks.has(e.id)));
  if(i>=view.length) i=0;
  render();
}

function render(){
  const c = document.getElementById('card');
  document.getElementById('count').textContent =
    `${view.length ? i+1 : 0} / ${view.length}  (σύνολο ${all.length})`;
  if(!view.length){ c.innerHTML='Καμία εγγραφή για αυτό το φίλτρο.'; return; }
  const e = view[i];
  const marked = marks.has(e.id);
  c.innerHTML = `
    <div class="meta">
      <span class="tag">#${e.rank}</span>
      <span class="tag ${e.acoustic?'ac':''}">${e.cat}${e.acoustic?' · acoustic':''}</span>
      <span>${e.city} · ${e.meeting}</span>
      <span>${e.dur}s</span>
    </div>
    <div class="lbl">διόρθωση (πριν → μετά)</div>
    <div class="diff">${diff(e.before, e.after)}</div>
    <div class="lbl">τελικό κείμενο</div>
    <div class="txt">${e.after.replace(/[<>&]/g,x=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[x]))}</div>
    ${e.why?`<div class="why">LLM: ${e.why}</div>`:''}
    <div class="controls">
      <button class="play" id="play">▶ Play span</button>
      <button class="mark ${marked?'on':''}" id="markbtn">${marked?'★ marked':'☆ mark'}</button>
      <button id="prev">← prev</button>
      <button id="next">next →</button>
    </div>
    <div class="bar"><div id="prog"></div></div>`;
  document.getElementById('play').onclick = togglePlay;
  document.getElementById('markbtn').onclick = toggleMark;
  document.getElementById('prev').onclick = ()=>go(-1);
  document.getElementById('next').onclick = ()=>go(1);
}

function go(d){ if(!view.length) return; stop(); i=(i+d+view.length)%view.length; render(); }
function toggleMark(){ const e=view[i]; if(marks.has(e.id))marks.delete(e.id); else marks.add(e.id); saveMarks(); render(); }

function togglePlay(){
  if(playing){ stop(); return; }
  const e = view[i];
  au.src = '/api/audio?u=' + encodeURIComponent(e.url);
  stopAt = e.end;
  au.currentTime = 0;
  const seek = ()=>{ au.currentTime = e.start; au.play(); };
  if(au.readyState>=1) seek(); else au.addEventListener('loadedmetadata', seek, {once:true});
  playing=true;
  const btn=document.getElementById('play'); if(btn) btn.textContent='◼ stop';
}
function stop(){ au.pause(); playing=false; const b=document.getElementById('play'); if(b)b.textContent='▶ Play span';
                 const p=document.getElementById('prog'); if(p)p.style.width='0'; }
au.addEventListener('timeupdate', ()=>{
  if(!playing) return;
  const e=view[i];
  const p=document.getElementById('prog');
  if(p) p.style.width = Math.max(0,Math.min(100,(au.currentTime-e.start)/(e.end-e.start)*100))+'%';
  if(au.currentTime>=stopAt) stop();
});

document.addEventListener('keydown', ev=>{
  if(ev.key==='ArrowLeft') go(-1);
  else if(ev.key==='ArrowRight') go(1);
  else if(ev.key===' '){ ev.preventDefault(); togglePlay(); }
  else if(ev.key==='m') toggleMark();
});

document.getElementById('export').onclick = ()=>{
  const marked = all.filter(e=>marks.has(e.id));
  const blob = new Blob([marked.map(e=>JSON.stringify(e)).join('\n')], {type:'application/x-ndjson'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='nb2_marked.jsonl'; a.click();
};
document.getElementById('cat').onchange = ()=>{ i=0; applyFilter(); };
document.getElementById('onlymark').onchange = ()=>{ i=0; applyFilter(); };

fetch('edits.json').then(r=>r.json()).then(d=>{
  all=d;
  const cats=['(όλες)',...[...new Set(d.map(e=>e.cat))].sort()];
  document.getElementById('cat').innerHTML = cats.map(c=>`<option>${c}</option>`).join('');
  applyFilter();
}).catch(e=>{ document.getElementById('card').innerHTML='Σφάλμα φόρτωσης edits.json: '+e; });
</script>
</body>
</html>
